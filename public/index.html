<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#06060e"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Crown Bible — வேத வசனம்</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Tamil:wght@400;600;700&family=Noto+Sans+Tamil:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#06060e;--bg2:#0f0f1e;--bg3:#181830;--bg4:#20203a;
  --border:rgba(201,168,76,.12);--text:#ede0c4;--text2:rgba(237,224,196,.55);--text3:rgba(237,224,196,.2);
  --gold:#c9a84c;--gold2:#e8c060;--acc:#1a5eff;--red:#c0392b;
  --ta:'Noto Serif Tamil',serif;--ta2:'Noto Sans Tamil',sans-serif;
  --en:'EB Garamond','Georgia',serif;--sans:'Barlow Condensed','Arial Narrow',sans-serif;
  --nav:60px;--hdr:52px;--r:8px;
}
[data-light]{
  --bg:#f5f0e6;--bg2:#faf6ec;--bg3:#ede6d4;--bg4:#e2d8c4;
  --border:rgba(100,80,40,.15);--text:#1a0e00;--text2:rgba(26,14,0,.5);--text3:rgba(26,14,0,.18);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}
body{font-family:var(--ta2);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
button:active{opacity:.7}
input{font-family:inherit;outline:none;border:none}
::-webkit-scrollbar{display:none}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto;overflow:hidden;position:relative}
#hdr{flex-shrink:0;height:var(--hdr);background:var(--bg2);border-bottom:2px solid var(--gold);display:flex;align-items:center;justify-content:space-between;padding:0 14px;z-index:50}
#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#nav{flex-shrink:0;height:var(--nav);background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:50}

/* ── LOADER ── */
#ls{position:fixed;inset:0;z-index:9999;background:#030308;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;cursor:pointer}
.ls-cross{font-size:56px;color:var(--gold);text-shadow:0 0 30px rgba(201,168,76,.4)}
.ls-brand{font-size:22px;letter-spacing:8px;color:var(--text);font-family:var(--sans);font-weight:700}
.ls-sub{font-size:9px;letter-spacing:3px;color:var(--gold);font-family:var(--sans);opacity:.7}
.ls-msg{font-size:10px;color:var(--text3);letter-spacing:2px;font-family:var(--sans);text-align:center;padding:0 30px;min-height:16px}
.ls-track{width:220px;height:3px;background:rgba(201,168,76,.15);overflow:hidden;border-radius:2px}
.ls-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));width:0%;transition:width .5s ease;border-radius:2px}
.ls-cnt{font-size:10px;color:rgba(201,168,76,.5);letter-spacing:1px;font-family:var(--sans)}

/* ── HEADER ── */
.h-logo{display:flex;align-items:center;gap:10px}
.h-cross{font-size:24px;color:var(--gold)}
.h-title{font-size:14px;letter-spacing:3px;font-weight:700;color:var(--text);font-family:var(--sans)}
.h-sub{font-size:7px;letter-spacing:1px;color:var(--text3);font-family:var(--sans);margin-top:1px}
.h-btns{display:flex;gap:6px}
.h-btn{background:rgba(201,168,76,.08);border:1px solid var(--border);color:var(--text2);width:36px;height:30px;font-size:12px;font-weight:700;font-family:var(--sans);border-radius:4px}
.h-btn:active{background:rgba(201,168,76,.2)}

/* ── NAV ── */
.nb{flex:1;background:none;border:none;color:var(--text3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all .15s;padding:6px 0}
.nb.on{color:var(--gold);border-top:2px solid var(--gold);background:rgba(201,168,76,.05)}
.ni{font-size:18px;line-height:1}
.nl{font-size:7px;font-weight:700;letter-spacing:.5px;font-family:var(--sans)}

/* ── SCREENS ── */
.scr{display:none}.scr.on{display:block;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── HOME ── */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:4px}
.tile{padding:16px;display:flex;flex-direction:column;justify-content:space-between;min-height:90px;cursor:pointer;overflow:hidden;position:relative;border-radius:var(--r)}
.tile::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0);transition:.2s}.tile:active::after{background:rgba(0,0,0,.15)}
.tile.w2{grid-column:1/3;min-height:140px}
.tile.clk{grid-column:1/3;min-height:80px;cursor:default}
.clk-t{font-size:42px;font-weight:300;color:#fff;letter-spacing:-2px;font-family:var(--sans)}
.clk-d{font-size:10px;color:rgba(255,255,255,.55);margin-top:4px;font-family:var(--ta2)}
.d-tag{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.45);margin-bottom:8px;font-family:var(--sans)}
.d-ta{font-size:14px;color:#fff;line-height:1.9;font-family:var(--ta);margin-bottom:6px}
.d-en{font-size:12px;color:rgba(255,255,255,.8);line-height:1.7;font-family:var(--en);font-style:italic;margin-bottom:8px}
.d-ref{font-size:9px;color:rgba(255,255,255,.6);font-weight:700;margin-bottom:10px;font-family:var(--sans)}
.d-btns{display:flex;gap:5px}
.d-btn{background:rgba(255,255,255,.18);border:none;color:#fff;padding:6px 12px;font-size:9px;font-weight:700;font-family:var(--sans);border-radius:4px}
.tl{font-size:14px;font-weight:700;color:#fff;font-family:var(--sans)}
.ts{font-size:9px;color:rgba(255,255,255,.55);margin-top:4px;font-family:var(--sans)}
.t-arr{font-size:18px;color:rgba(255,255,255,.3);align-self:flex-end}

/* ── HIGHLIGHTED VERSE (Day verse with glow) ── */
.highlight-card{margin:4px;border-radius:var(--r);background:linear-gradient(135deg,#1a0a3e,#2d1060);border:1px solid rgba(201,168,76,.3);padding:18px;position:relative;overflow:hidden;cursor:pointer}
.highlight-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(201,168,76,.15),transparent);pointer-events:none}
.hc-tag{font-size:8px;letter-spacing:4px;color:var(--gold);font-family:var(--sans);margin-bottom:12px;font-weight:700}
.hc-ta{font-size:16px;line-height:2;color:#fff;font-family:var(--ta);margin-bottom:10px}
.hc-en{font-size:14px;line-height:1.8;color:rgba(255,255,255,.8);font-family:var(--en);font-style:italic;margin-bottom:12px}
.hc-ref{font-size:10px;color:var(--gold);font-weight:700;font-family:var(--sans);margin-bottom:12px}
.hc-btns{display:flex;gap:6px;flex-wrap:wrap}
.hc-btn{background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.3);color:var(--gold);padding:7px 14px;font-size:9px;font-weight:700;font-family:var(--sans);border-radius:4px}
.hc-btn.primary{background:var(--gold);color:#06060e}

/* ── SECTION HEADER ── */
.sh{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sht{font-size:8px;letter-spacing:3px;font-weight:700;color:var(--text2);font-family:var(--sans)}
.shc{font-size:9px;color:var(--text3);font-family:var(--sans)}

/* ── VERSE CARDS ── */
.vc{background:var(--bg2);border-bottom:1px solid var(--border)}
.vc.saved-highlight{border-left:3px solid var(--gold)}
.vch{padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-radius:var(--r) var(--r) 0 0}
.vr{font-size:11px;font-weight:700;color:#fff;letter-spacing:.5px;font-family:var(--sans)}
.vbk{font-size:9px;color:rgba(255,255,255,.55);font-family:var(--ta2)}
.vbd{padding:12px 14px}
.vta{font-size:16px;line-height:2.1;color:var(--text);font-family:var(--ta);margin-bottom:8px}
.ven{font-size:15px;line-height:1.9;color:var(--text);font-family:var(--en);font-style:italic}
.va{display:flex;gap:2px;margin-top:10px;flex-wrap:wrap}
.va button{flex:1;min-width:60px;padding:7px 4px;background:var(--bg3);color:var(--text2);font-size:8px;font-weight:700;border-top:1px solid var(--border);font-family:var(--sans);border-radius:0 0 4px 4px}
.va button:active{background:var(--bg4)}

/* ── SEARCH BAR ── */
.sbar{display:flex;border-bottom:2px solid var(--gold);background:var(--bg2)}
.sinp{flex:1;background:transparent;padding:13px 14px;color:var(--text);font-size:15px;font-family:var(--en)}
.sinp::placeholder{color:var(--text3);font-style:italic}
.sbtn{background:var(--gold);color:#06060e;width:48px;font-size:18px;font-weight:700}

/* ── CHIPS ── */
.chips{display:flex;gap:5px;overflow-x:auto;padding:10px 14px;border-bottom:1px solid var(--border)}
.chip{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:6px 14px;font-size:9px;white-space:nowrap;font-family:var(--sans);border-radius:20px;cursor:pointer}
.chip.on{background:var(--gold);border-color:var(--gold);color:#06060e}

/* ── LANG TOGGLE ── */
.ltog{display:flex;gap:2px;padding:6px 14px;background:var(--bg2);border-bottom:1px solid var(--border)}
.ltog button{flex:1;padding:8px;background:var(--bg3);color:var(--text2);font-size:9px;font-weight:700;font-family:var(--sans);border-radius:4px}
.ltog button.on{background:var(--acc);color:#fff}

/* ── PAGINATION ── */
.pgbar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--border)}
.pgbtn{background:var(--gold);color:#06060e;padding:7px 18px;font-size:9px;font-weight:700;font-family:var(--sans);border-radius:4px}
.pgbtn:disabled{background:var(--bg3);color:var(--text3)}
.pgi{font-size:9px;color:var(--text2);font-family:var(--sans)}

/* ── BOOKS GRID ── */
.bfilt{display:flex;gap:3px;padding:4px 4px 0}
.bfilt button{flex:1;padding:9px;background:var(--bg3);color:var(--text2);font-size:9px;font-weight:700;font-family:var(--sans);border-radius:var(--r)}
.bfilt button.on{background:#0d4a1a;color:#fff}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:3px}
.btile{padding:14px 12px;min-height:100px;display:flex;flex-direction:column;justify-content:space-between;border-radius:var(--r);cursor:pointer}
.bne{font-size:13px;color:#fff;font-weight:700;font-family:var(--sans)}
.bnt{font-size:12px;color:rgba(255,255,255,.75);font-family:var(--ta2);margin-top:3px}
.bm{font-size:8px;color:rgba(255,255,255,.45);font-family:var(--sans);margin-top:3px}
.bb{display:flex;gap:3px;margin-top:10px}
.bb button{flex:1;background:rgba(255,255,255,.18);color:#fff;padding:6px 0;font-size:8px;font-weight:700;font-family:var(--sans);border-radius:4px}

/* ── CHARACTERS GRID ── */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:3px}
.ctile{padding:14px;min-height:120px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;position:relative;overflow:hidden;border-radius:var(--r)}
.cemi{position:absolute;right:10px;top:10px;font-size:36px;opacity:.2}
.cn{font-size:14px;font-weight:700;color:#fff;font-family:var(--sans)}
.cnt{font-size:12px;color:rgba(255,255,255,.75);font-family:var(--ta2);margin-top:3px}
.ce{font-size:8px;color:rgba(255,255,255,.45);font-family:var(--sans);margin-top:3px}
.ctl{font-size:11px;color:rgba(255,255,255,.65);font-family:var(--en);font-style:italic;margin-top:5px;line-height:1.4}
.cbtn{background:rgba(255,255,255,.2);color:#fff;padding:7px;font-size:8px;font-weight:700;font-family:var(--sans);width:100%;margin-top:8px;border-radius:4px;text-align:center}

/* ── SAVED ── */
.empty{text-align:center;padding:60px 20px}
.emico{font-size:48px;margin-bottom:16px;opacity:.15}
.emtxt{font-size:9px;letter-spacing:2px;color:var(--text3);line-height:2.4;font-family:var(--sans)}

/* ── AD SLOTS ── */
.ad{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;justify-content:center}
.adlbl{font-size:8px;color:var(--text3);letter-spacing:2px;font-family:var(--sans)}

/* ── READING MODE ── */
#read-ov{display:none;position:fixed;inset:0;z-index:300;flex-direction:column;max-width:500px;margin:0 auto}
#read-ov.on{display:flex;animation:fadeUp .2s ease}
.rbar{flex-shrink:0;padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.rbody{flex:1;overflow-y:auto;padding:36px 24px 80px}
.rta{font-family:var(--ta);line-height:2.3;margin-bottom:28px;color:var(--text)}
.rdiv{height:1px;width:50px;margin-bottom:28px;opacity:.5}
.ren{line-height:2;font-style:italic;color:var(--text);font-family:var(--en)}
.rbadge{display:inline-block;padding:6px 20px;font-size:9px;font-weight:700;letter-spacing:3px;margin-top:24px;font-family:var(--sans);border-radius:4px}
.rctls{display:flex;gap:5px;align-items:center}
.rcbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;font-family:var(--sans);border-radius:4px;display:flex;align-items:center;justify-content:center}

/* ── CHAPTER READER ── */
#ch-ov{display:none;position:fixed;inset:0;z-index:300;flex-direction:column;max-width:500px;margin:0 auto}
#ch-ov.on{display:flex;animation:fadeUp .2s ease}
.chbar{flex-shrink:0;padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.chbody{flex:1;overflow-y:auto;padding:12px 14px;background:var(--bg)}
.chv{padding:10px 0;border-bottom:1px solid var(--border);display:flex;gap:12px}
.chvn{font-size:10px;font-weight:700;color:var(--gold);font-family:var(--sans);flex-shrink:0;padding-top:4px;width:30px;text-align:right}
.chvcol{flex:1}
.chvta{font-size:16px;line-height:2.1;color:var(--text);font-family:var(--ta);margin-bottom:6px}
.chven{font-size:15px;line-height:1.9;color:var(--text2);font-family:var(--en);font-style:italic}
.chnav{display:flex;gap:3px;padding:8px;flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border)}
.chnav button{flex:1;padding:10px;background:var(--bg3);color:var(--text2);font-size:9px;font-weight:700;font-family:var(--sans);border-radius:4px}
.chnav button.on{background:var(--gold);color:#06060e}
.chlb{display:flex;gap:3px;margin-right:5px}
.chlb button{padding:0 10px;height:30px;background:var(--bg3);color:var(--text2);font-size:8px;font-weight:700;font-family:var(--sans);border-radius:4px}
.chlb button.on{background:var(--acc);color:#fff}

/* ── CHARACTER DETAIL ── */
#char-ov{display:none;position:fixed;inset:0;z-index:400;flex-direction:column;max-width:500px;margin:0 auto;background:var(--bg)}
#char-ov.on{display:flex;animation:fadeUp .2s ease}
.charbar{flex-shrink:0;padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.cbl{display:flex;align-items:center;gap:10px}
.cbig{font-size:32px}
.cbn{font-size:16px;font-weight:700;color:#fff;font-family:var(--sans)}
.cbta{font-size:12px;color:rgba(255,255,255,.65);font-family:var(--ta2);margin-top:3px}
.cbera{font-size:8px;color:rgba(255,255,255,.4);font-family:var(--sans)}
.cbody{flex:1;overflow-y:auto}
.csec{padding:16px;border-bottom:1px solid var(--border)}
.csl{font-size:8px;letter-spacing:4px;font-weight:700;color:var(--text3);font-family:var(--sans);margin-bottom:12px}
.csen{font-size:15px;line-height:1.95;color:var(--text);font-family:var(--en)}
.csta{font-size:14px;line-height:2.1;color:var(--text2);font-family:var(--ta);margin-top:12px}
.tli{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid var(--border)}.tli:last-child{border-bottom:none}
.tlcol{display:flex;flex-direction:column;align-items:center;gap:4px}
.tldot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tlline{width:1px;background:var(--border);flex:1}
.tlref{font-size:9px;font-weight:700;font-family:var(--sans);color:rgba(255,255,255,.55);margin-bottom:4px}
.tlen{font-size:14px;line-height:1.7;color:var(--text);font-family:var(--en)}
.tlta{font-size:13px;line-height:1.9;color:var(--text2);font-family:var(--ta);margin-top:4px}
.kv{background:var(--bg3);border-left:3px solid var(--gold);padding:14px;margin-bottom:10px;border-radius:0 var(--r) var(--r) 0}
.kvref{font-size:9px;font-weight:700;color:var(--gold);font-family:var(--sans);margin-bottom:8px}
.kvta{font-size:15px;line-height:2.1;color:var(--text);font-family:var(--ta);margin-bottom:6px}
.kven{font-size:14px;line-height:1.9;color:var(--text2);font-family:var(--en);font-style:italic}
.kvact{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
.kvact button{flex:1;min-width:80px;padding:8px;font-size:8px;font-weight:700;font-family:var(--sans);border-radius:4px}
.lesn{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)}.lesn:last-child{border-bottom:none}
.lesnn{font-size:26px;font-weight:700;color:var(--gold);font-family:var(--sans);opacity:.4;flex-shrink:0;line-height:1;margin-top:2px}
.lesen{font-size:15px;line-height:1.85;color:var(--text);font-family:var(--en)}
.lesta{font-size:13px;line-height:2;color:var(--text2);font-family:var(--ta);margin-top:6px}

/* ── AUDIO PANEL ── */
#au-panel{display:none;position:fixed;bottom:var(--nav);left:0;right:0;z-index:200;max-width:500px;margin:0 auto}
#au-panel.on{display:block}
.auinner{background:linear-gradient(135deg,#020c20,#081430);padding:15px;box-shadow:0 -6px 24px rgba(0,0,0,.7);position:relative;border-top:1px solid rgba(100,150,255,.25)}
.aut{font-size:10px;font-weight:700;color:#fff;letter-spacing:2px;font-family:var(--sans);margin-bottom:3px}
.aur{font-size:9px;color:rgba(255,255,255,.4);font-family:var(--sans);margin-bottom:10px}
.aulng{display:flex;gap:3px;margin-bottom:10px}
.aulng button{flex:1;padding:7px;font-size:9px;font-weight:700;font-family:var(--sans);border-radius:4px}
.auctls{display:flex;gap:4px}
.auctls button{flex:1;padding:10px 4px;font-size:9px;font-weight:700;font-family:var(--sans);border-radius:4px}
.aucls{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.1);color:#fff;width:28px;height:28px;font-size:14px;border-radius:50%}
.aumsg{margin-top:6px;font-size:9px;color:rgba(255,255,255,.4);font-family:var(--sans);line-height:1.6}
.auprog{height:3px;background:rgba(255,255,255,.1);margin-top:10px;overflow:hidden;border-radius:2px}
.aubar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));width:0%;transition:width .3s ease}

/* ── DAILY VERSE STRIP ── */
.dv-strip{margin:4px;border-radius:var(--r);background:linear-gradient(135deg,#0d3a1a,#1a5c2e);padding:14px;cursor:pointer}
.dv-tag{font-size:8px;letter-spacing:4px;color:rgba(255,255,255,.5);font-family:var(--sans);margin-bottom:8px}
.dv-ta{font-size:14px;color:#fff;line-height:1.9;font-family:var(--ta)}
.dv-ref{font-size:9px;color:rgba(255,255,255,.5);font-family:var(--sans);margin-top:6px}

/* ── AI SEARCH ── */
.ai-hdr{background:linear-gradient(135deg,#2d0a5e,#4a1080);padding:16px 16px 12px}
