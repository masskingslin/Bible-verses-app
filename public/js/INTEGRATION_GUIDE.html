<!-- ─────────────────────────────────────────────────
     STEP 5: Add Bookmark button to each verse
     Find your verse rendering code and add this icon:
     ───────────────────────────────────────────────── -->

<!-- Inside your verse render function, add bookmark button: -->
<script>
function renderVerseWithBookmark(verse) {
  const ref = `${verse.book_name_en} ${verse.chapter}:${verse.verse_num}`;
  const isBookmarked = Bookmarks.isBookmarked(ref);
  return `
    <div class="verse-block">
      <div class="verse-num">${verse.verse_num}</div>
      <div class="verse-text-ta" style="font-size: var(--verse-ta-font-size)">${verse.text_ta}</div>
      <div class="verse-text-en" style="font-size: var(--verse-font-size)">${verse.text_en}</div>
      <div class="verse-actions">
        <button class="verse-action-btn" id="bm_${verse.verse_num}"
          onclick="toggleVerseBookmark('${ref}', ${JSON.stringify(verse).replace(/'/g,'\\'')})">
          ${isBookmarked ? '🔖' : '🏷️'}
        </button>
        <button class="verse-action-btn" onclick="shareVerse('${ref}', '${verse.text_en.replace(/'/g,"\\'")}')">
          📤
        </button>
      </div>
    </div>
  `;
}

function toggleVerseBookmark(ref, verse) {
  const saved = Bookmarks.save(verse);
  if (saved) {
    showToast('🔖 Bookmarked!');
  } else {
    Bookmarks.remove(ref);
    showToast('🗑 Bookmark removed');
  }
  // Refresh icon
  const btn = document.getElementById(`bm_${verse.verse_num}`);
  if (btn) btn.innerHTML = Bookmarks.isBookmarked(ref) ? '🔖' : '🏷️';
}
</script>
