name: Build & Deploy Holy Bible APK

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v3
      
      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      # Step 3: Setup Java (required for Android SDK)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      # Step 4: Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-levels: '30,31,32,33,34'
          build-tools: '34.0.0'
      
      # Step 5: Install npm dependencies
      - name: Install Dependencies
        run: npm ci
      
      # Step 6: Add Android platform to Capacitor
      - name: Add Android Platform
        run: npx cap add android --web-dir=public
        continue-on-error: true
      
      # Step 7: Sync Capacitor
      - name: Sync Capacitor
        run: npx cap sync android
      
      # Step 8: Copy app icons to Android mipmap folders
      - name: Copy App Icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          
          cp android-icons/mipmap-mdpi/ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png || true
          cp android-icons/mipmap-mdpi/ic_launcher_round.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png || true
          
          cp android-icons/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png || true
          cp android-icons/mipmap-hdpi/ic_launcher_round.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png || true
          
          cp android-icons/mipmap-xhdpi/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png || true
          cp android-icons/mipmap-xhdpi/ic_launcher_round.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png || true
          
          cp android-icons/mipmap-xxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png || true
          cp android-icons/mipmap-xxhdpi/ic_launcher_round.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png || true
          
          cp android-icons/mipmap-xxxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png || true
          cp android-icons/mipmap-xxxhdpi/ic_launcher_round.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png || true
          
          echo "✓ Icons copied to all mipmap folders"
      
      # Step 9: Inject AdMob App ID into AndroidManifest.xml
      - name: Inject AdMob App ID
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          
          # Add meta-data for AdMob App ID if not exists
          if ! grep -q 'com.google.android.gms.ads.APPLICATION_ID' "$MANIFEST_PATH"; then
            # Find the last </application> closing tag
            sed -i '/<\/application>/i \        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-9057426786910647~7730878522"/>' "$MANIFEST_PATH"
            echo "✓ AdMob App ID injected"
          else
            echo "✓ AdMob App ID already present"
          fi
      
      # Step 10: Build APK (Debug)
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew clean assembleDebug --stacktrace -x lint
      
      # Step 11: Build Release APK (Optional - uncomment to enable)
      # Requires GitHub Secrets: KEYSTORE_BASE64, KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD
      # - name: Build Release APK
      #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      #   env:
      #     KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      #     KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      #     KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      #     STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      #   run: |
      #     echo "$KEYSTORE_BASE64" | base64 -d > android/holy-bible.keystore
      #     cd android
      #     ./gradlew bundleRelease \
      #       -Pandroid.injected.signing.store.file=$(pwd)/holy-bible.keystore \
      #       -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
      #       -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
      #       -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
      #       --stacktrace
      
      # Step 12: List build outputs
      - name: List Build Outputs
        run: |
          echo "=== DEBUG APK ==="
          ls -lh android/app/build/outputs/apk/debug/ || echo "No debug APK"
          echo ""
          echo "=== ALL OUTPUTS ==="
          find android/app/build/outputs -type f -name "*.apk" -o -name "*.aab" | head -20
      
      # Step 13: Upload APK as artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v3
        with:
          name: HolyBible-APK-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      # Step 14: Upload Release Bundle (if created)
      # - name: Upload Release Bundle
      #   uses: actions/upload-artifact@v3
      #   with:
      #     name: HolyBible-AAB-Release
      #     path: android/app/build/outputs/bundle/release/app-release.aab
      #     retention-days: 30
      
      # Step 15: Create Release (optional - for tagged commits)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # Step 16: Print success message
      - name: Build Success
        run: |
          echo ""
          echo "✅ BUILD SUCCESSFUL!"
          echo ""
          echo "📱 APK Location: android/app/build/outputs/apk/debug/app-debug.apk"
          echo "📥 Download from: Actions → Artifacts → HolyBible-APK-Debug"
          echo ""
          echo "💾 Install on device:"
          echo "   adb install -r app-debug.apk"
          echo ""

# Build on:
# - Every push to main/master/develop
# - Every pull request
# - Tagged commits (creates GitHub Release)

# Environment:
# - Node.js 18
# - Java 17
# - Android SDK 30+
# - Gradle 7.x