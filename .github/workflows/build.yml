name: Build Holy Bible APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options: [ debug, release ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install packages
        run: npm install

      # ── FIX: Install native TTS plugin (replaces broken Web Speech API) ──
      - name: Install Capacitor TTS plugin
        run: npm install @capacitor-community/text-to-speech

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@5

      - name: Prepare icons in public folder
        run: |
          cp android-icons/mipmap-xxxhdpi/ic_launcher.png public/icon.png
          echo "icon.png ready"

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync web app to Android
        run: npx cap sync android

      - name: Set app name to Holy Bible
        run: |
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS_FILE" ]; then
            sed -i 's|<string name="app_name">.*</string>|<string name="app_name">Holy Bible</string>|g' "$STRINGS_FILE"
            echo "strings.xml updated:"
            grep app_name "$STRINGS_FILE"
          else
            echo "Creating strings.xml"
            mkdir -p android/app/src/main/res/values
            echo '<?xml version="1.0" encoding="utf-8"?>
            <resources>
                <string name="app_name">Holy Bible</string>
                <string name="title_activity_main">Holy Bible</string>
                <string name="package_name">com.vedavachanam.holybible</string>
                <string name="custom_url_scheme">com.vedavachanam.holybible</string>
            </resources>' > "$STRINGS_FILE"
          fi

      - name: Inject app icons into Android
        run: |
          ICON_SRC="android-icons"
          ICON_DST="android/app/src/main/res"
          for DENSITY in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p "$ICON_DST/mipmap-$DENSITY"
            cp "$ICON_SRC/mipmap-$DENSITY/ic_launcher.png" \
               "$ICON_DST/mipmap-$DENSITY/ic_launcher.png"
            cp "$ICON_SRC/mipmap-$DENSITY/ic_launcher_round.png" \
               "$ICON_DST/mipmap-$DENSITY/ic_launcher_round.png"
            cp "$ICON_SRC/mipmap-$DENSITY/ic_launcher_foreground.png" \
               "$ICON_DST/mipmap-$DENSITY/ic_launcher_foreground.png"
            echo "  Injected all icons for $DENSITY"
          done
          echo "All icons injected!"

      - name: Fix adaptive icon XML
        run: |
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26

          echo '<?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>' > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml

          echo '<?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>' > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

          mkdir -p android/app/src/main/res/values
          echo '<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#080810</color>
          </resources>' > android/app/src/main/res/values/ic_launcher_background.xml

          echo "Adaptive icon XML fixed"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── FIX: Stamp versionCode = run number so installs never downgrade ──
      - name: Set versionCode and versionName
        run: |
          BUILD_NUM=${{ github.run_number }}
          sed -i "s/versionCode .*/versionCode $BUILD_NUM/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"2.2.$BUILD_NUM\"/" android/app/build.gradle
          echo "✅ versionCode=$BUILD_NUM  versionName=2.2.$BUILD_NUM"
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: android
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ../bible.keystore
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../bible.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HolyBible-APK-${{ github.run_number }}
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 30
