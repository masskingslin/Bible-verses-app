name: Build Crown Bible APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # FIX: install @capacitor/cli globally so 'cap' command works
      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli@5.7.0

      # Install project dependencies
      - name: Install project dependencies
        run: npm install

      # Add Android platform if missing
      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            echo "Adding Android platform..."
            cap add android
          else
            echo "Android platform already exists"
          fi

      # Sync web assets into Android
      - name: Sync Capacitor
        run: cap sync android

      # Build the APK
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          echo "=== APK files ==="
          find . -name "*.apk" | head -5

      # Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CrownBible-APK-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30