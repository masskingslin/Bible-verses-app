name: Build Holy Bible APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options: [ debug, release ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install packages
        run: npm install

      - name: Install Capacitor TTS plugin (Capacitor 5)
        run: npm install @capacitor-community/text-to-speech@5.0.0 --legacy-peer-deps

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@5

      - name: Prepare icons in public folder
        run: |
          cp android-icons/mipmap-xxxhdpi/ic_launcher.png public/icon.png

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync web app to Android
        run: npx cap sync android

      - name: Set app name to Holy Bible
        run: |
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS_FILE" ]; then
            sed -i 's|<string name="app_name">.*</string>|<string name="app_name">Holy Bible</string>|g' "$STRINGS_FILE"
          else
            mkdir -p android/app/src/main/res/values
            printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <string name="app_name">Holy Bible</string>\n    <string name="title_activity_main">Holy Bible</string>\n    <string name="package_name">com.vedavachanam.holybible</string>\n    <string name="custom_url_scheme">com.vedavachanam.holybible</string>\n</resources>\n' > "$STRINGS_FILE"
          fi

      - name: Inject app icons
        run: |
          ICON_SRC="android-icons"; ICON_DST="android/app/src/main/res"
          for D in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p "$ICON_DST/mipmap-$D"
            cp "$ICON_SRC/mipmap-$D/ic_launcher.png"            "$ICON_DST/mipmap-$D/ic_launcher.png"
            cp "$ICON_SRC/mipmap-$D/ic_launcher_round.png"      "$ICON_DST/mipmap-$D/ic_launcher_round.png"
            cp "$ICON_SRC/mipmap-$D/ic_launcher_foreground.png" "$ICON_DST/mipmap-$D/ic_launcher_foreground.png"
          done

      - name: Fix adaptive icon XML
        run: |
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          for f in ic_launcher ic_launcher_round; do
            printf '<?xml version="1.0" encoding="utf-8"?>\n<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">\n    <background android:drawable="@color/ic_launcher_background"/>\n    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>\n</adaptive-icon>\n' > android/app/src/main/res/mipmap-anydpi-v26/$f.xml
          done
          mkdir -p android/app/src/main/res/values
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <color name="ic_launcher_background">#080810</color>\n</resources>\n' > android/app/src/main/res/values/ic_launcher_background.xml

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Set versionCode and versionName
        run: |
          BUILD_NUM=${{ github.run_number }}
          sed -i "s/versionCode .*/versionCode $BUILD_NUM/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"2.2.$BUILD_NUM\"/" android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle

      # ════════════════════════════════════════════════════
      # AUTO KEYSTORE — No laptop needed
      # First run: auto-generates keystore, saves as artifact
      # After that: set KEYSTORE_BASE64 secret once on GitHub
      # ════════════════════════════════════════════════════
      - name: Setup signing keystore
        id: keystore
        run: |
          KS="${{ github.workspace }}/bible.keystore"
          KS_PASS="HolyBible2025"
          ALIAS="holybible"
          KEY_PASS="HolyBible2025"

          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Restoring keystore from secret..."
            printf '%s' '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > "$KS"
            KS_PASS="${{ secrets.STORE_PASSWORD }}"
            ALIAS="${{ secrets.KEY_ALIAS }}"
            KEY_PASS="${{ secrets.KEY_PASSWORD }}"
          else
            echo "Auto-generating keystore (first-time setup)..."
            keytool -genkeypair \
              -keystore "$KS" \
              -alias "$ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "$KS_PASS" \
              -keypass  "$KEY_PASS" \
              -dname "CN=Holy Bible,OU=App,O=VedaVachanam,L=TamilNadu,S=TamilNadu,C=IN" \
              -storetype PKCS12
            echo ""
            echo "╔══════════════════════════════════════════╗"
            echo "║  COPY THIS — set as KEYSTORE_BASE64      ║"
            echo "╚══════════════════════════════════════════╝"
            base64 -w 0 "$KS"
            echo ""
            echo "STORE_PASSWORD = $KS_PASS"
            echo "KEY_ALIAS      = $ALIAS"
            echo "KEY_PASSWORD   = $KEY_PASS"
          fi

          echo "KS_FILE=$KS"       >> $GITHUB_ENV
          echo "KS_PASS=$KS_PASS"  >> $GITHUB_ENV
          echo "KS_ALIAS=$ALIAS"   >> $GITHUB_ENV
          echo "KS_KPASS=$KEY_PASS" >> $GITHUB_ENV

      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK (signed)
        if: ${{ github.event.inputs.build_type != 'debug' }}
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="${{ env.KS_FILE }}" \
            -Pandroid.injected.signing.store.password="${{ env.KS_PASS }}" \
            -Pandroid.injected.signing.key.alias="${{ env.KS_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ env.KS_KPASS }}" \
            --no-daemon
          echo "Release APK signed successfully"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HolyBible-APK-${{ github.run_number }}
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 30
