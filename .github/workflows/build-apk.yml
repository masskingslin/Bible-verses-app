name: Build Bible App APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type: debug or release'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build
        env:
          CI: false
          GENERATE_SOURCEMAP: false

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@5

      - name: Add Android Platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Gradlew Permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: android
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ../bible.keystore
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../bible.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BibleApp-APK-${{ github.run_number }}
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 30